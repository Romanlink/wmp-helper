# ============================================================
# Helper 后台管理系统 - 应用配置
# ============================================================
# 以下为开发环境默认值，生产部署时由 deploy-helper.sh 通过环境变量覆盖
# 【安全】数据库/Redis 密码等敏感信息一律通过环境变量注入（见 deploy-helper.sh），
#        切勿在此硬编码明文；本文件已移除所有真实密码默认值。
# ============================================================

spring.application.name=helper
server.port=${SERVER_PORT:8321}

# ============================================================
# MySQL 数据源
# ============================================================
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/helper?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&characterEncoding=UTF-8&zeroDateTimeBehavior=CONVERT_TO_NULL}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:E3T4p5Km5JQEQKGe}

# ============================================================
# JPA / Hibernate 配置
# ============================================================
# 开发环境：update（Hibernate 自动同步表结构）
# 生产环境：deploy-helper.sh 传入 DDL_AUTO=none
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# ============================================================
# SQL 初始化（schema.sql / data.sql）
# ============================================================
# 开发环境：never（由 Hibernate 管理）
# 生产环境：deploy-helper.sh 传入 SQL_INIT_MODE=always
spring.sql.init.mode=${SQL_INIT_MODE:never}
spring.sql.init.schema-locations=classpath:sql/schema.sql
spring.sql.init.continue-on-error=true

# ============================================================
# Jackson JSON 配置
# ============================================================
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss
spring.jackson.time-zone=Asia/Shanghai
spring.jackson.serialization.write-dates-as-timestamps=false

# ============================================================
# 文件上传配置
# ============================================================
helper.upload.dir=${UPLOAD_DIR:./pdf}
spring.servlet.multipart.max-file-size=${MAX_FILE_SIZE:50MB}
spring.servlet.multipart.max-request-size=${MAX_FILE_SIZE:50MB}

# ============ 文档转换（PDF -> Word）============
# 临时目录：上传/转换/下载过程中的文件均先加密落此目录，用完即删
helper.convert.temp-dir=${CONVERT_TEMP_DIR:./convert-temp}
# LibreOffice 可执行文件路径（无头模式转换）。留空则自动探测（PATH / 常见安装位置）
helper.convert.soffice-path=${SOFFICE_PATH:}
# Python 解释器路径（pdf2docx 引擎用）。留空则自动探测：托管的隔离 venv(~/.workbuddy/binaries/python/envs/default) → python3 → python
helper.convert.python-path=${PYTHON_PATH:}
# 孤儿临时文件最大存活时间（分钟），超过则被定时清理任务删除
helper.convert.cleanup-max-age-minutes=${CONVERT_CLEANUP_MINUTES:30}

# ============================================================
# Redis 配置
# ============================================================
spring.redis.host=${REDIS_HOST:127.0.0.1}
spring.redis.port=${REDIS_PORT:6379}
spring.redis.password=${REDIS_PASSWORD:}
spring.redis.database=${REDIS_DB:0}
spring.redis.timeout=5000ms

# ============================================================
# 大模型接入配置（工厂 + 策略模式，可自由切换）
# ============================================================
# 总开关
helper.llm.enabled=${OLLAMA_ENABLED:true}
# 当前使用的模型：ollama | deepseek | qwen（默认本地 Ollama）
helper.llm.provider=ollama
# 接入地址（provider=ollama 时为本地地址；在线模型见下方示例）
helper.llm.base-url=${OLLAMA_BASE_URL:http://localhost:11434}
# 模型名
helper.llm.model=${OLLAMA_MODEL:qwen:7b}
# 在线大模型 API Key（Ollama 本地可留空；deploy-helper.sh 通过 LLM_API_KEY 注入）
helper.llm.api-key=${LLM_API_KEY:}

# ---- 在线大模型切换示例 ----
# 【DeepSeek】
# helper.llm.provider=deepseek
# helper.llm.base-url=https://api.deepseek.com
# helper.llm.model=deepseek-chat
# helper.llm.api-key=sk-你的deepseek-key
#
# 【阿里云百炼 Qwen】（base-url 指向兼容模式地址，代码自动拼接 /chat/completions）
# helper.llm.provider=qwen
# helper.llm.base-url=https://dashscope.aliyuncs.com/compatible-mode/v1
# helper.llm.model=qwen-plus
# helper.llm.api-key=sk-你的qwen-key

# ============================================================
# RAG 检索增强问答配置（向量化 + 向量库）
# ============================================================
# Embedding 模型（将文本转为向量）
helper.embedding.provider=${EMBEDDING_PROVIDER:ollama}
helper.embedding.base-url=${EMBEDDING_BASE_URL:http://localhost:11434}
helper.embedding.model=${EMBEDDING_MODEL:bge-m3}
helper.embedding.dim=${EMBEDDING_DIM:1024}

# Qdrant 向量库（REST 接口，默认 6333）
helper.qdrant.url=${QDRANT_URL:http://localhost:6333}
helper.qdrant.collection=${QDRANT_COLLECTION:doc_chunks}
helper.qdrant.dim=${QDRANT_DIM:1024}

# RAG 检索参数
helper.rag.top-k=${RAG_TOP_K:5}
helper.rag.chunk-size=${RAG_CHUNK_SIZE:500}
helper.rag.chunk-overlap=${RAG_CHUNK_OVERLAP:80}

